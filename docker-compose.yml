services:
    app:
        build:
            context: .
            dockerfile: _docker/app/Dockerfile
        image: laravel-octane-app
        container_name: laravel_app
        restart: unless-stopped
        working_dir: /var/www
        ports:
            - "8000:8000"
        volumes:
            - ./:/var/www
        command: php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000 --watch
